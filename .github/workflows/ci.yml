name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Build API
        run: go build -ldflags="-s -w" -o bin/zencial-api cmd/api/main.go

      - name: Build Migrate
        run: go build -ldflags="-s -w" -o bin/zencial-migrate cmd/migrate/main.go
