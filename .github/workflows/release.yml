name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to sync buildinfo.go to (e.g. v0.0.4)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  sync-version:
    name: Bump buildinfo.go to release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_VERSION_TOKEN }}

      - name: Resolve version from tag
        id: v
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update buildinfo.go
        run: |
          sed -i -E 's/(Version[[:space:]]*=[[:space:]]*)"[^"]*"/\1"${{ steps.v.outputs.tag }}"/' \
            internal/infrastructure/buildinfo/buildinfo.go

      - name: Commit and push if changed
        run: |
          git config user.name "zencial-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          if git diff --quiet -- internal/infrastructure/buildinfo/buildinfo.go; then
            echo "buildinfo.go already at ${{ steps.v.outputs.tag }} — nothing to do"
            exit 0
          fi
          git add internal/infrastructure/buildinfo/buildinfo.go
          git commit -m "chore: sync buildinfo.go to ${{ steps.v.outputs.tag }}"
          git push origin main

  docker:
    name: Build & Push Docker Image
    needs: sync-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
