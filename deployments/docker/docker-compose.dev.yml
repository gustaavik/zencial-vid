services:
  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.dev
    ports:
      - "${SERVER_PORT:-6091}:6091"
    volumes:
      - ../..:/app
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=6091
      - SERVER_READ_TIMEOUT=${SERVER_READ_TIMEOUT:-5m}
      - SERVER_WRITE_TIMEOUT=${SERVER_WRITE_TIMEOUT:-10m}

      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-zencial}
      - DB_PASSWORD=${DB_PASSWORD:-zencial_secret}
      - DB_NAME=${DB_NAME:-zencial}
      - DB_SSL_MODE=disable

      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_ENDPOINT=http://localhost:${MINIO_PORT:-9000}
      - S3_BUCKET=${S3_BUCKET:-zencial-videos}
      - S3_REGION=${S3_REGION:-eu-west-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}

      - CDN_BASE_URL=http://localhost:8090
      - CDN_INTERNAL_URL=http://cdn:8090
      - CDN_UPLOAD_SIGNING_KEY=${CDN_UPLOAD_SIGNING_KEY:-change-me-cdn-upload-signing-key}

      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      
      - INTERNAL_API_SHARED_SECRET=${INTERNAL_API_SHARED_SECRET:-dev-internal-secret}

      - LOG_LEVEL=debug
      - LOG_FORMAT=text
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-zencial}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-zencial_secret}
      - POSTGRES_DB=${DB_NAME:-zencial}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zencial}"]
      interval: 5s
      timeout: 5s
      retries: 5

  cdn:
    build:
      context: ../../../zencial-cdn
      dockerfile: Dockerfile.dev
    ports:
      - "${CDN_PORT:-8090}:8090"
    volumes:
      - ../../../zencial-cdn:/app
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8090
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-zencial-videos}
      - S3_REGION=${S3_REGION:-eu-west-1}
      - TRANSCODE_MAX_JOBS=2
      - VOD_CALLBACK_URL=http://api:6091/api/v1/internal/videos/%s/transcode-callback
      - VOD_CALLBACK_SECRET=${INTERNAL_API_SHARED_SECRET:-dev-internal-secret}
      - CDN_UPLOAD_SIGNING_KEY=${CDN_UPLOAD_SIGNING_KEY:-change-me-cdn-upload-signing-key}
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_dev_data:
  minio_dev_data:
