services:
  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.dev
    ports:
      - "${SERVER_PORT:-6091}:6091"
    volumes:
      - ../..:/app
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=6091
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-zencial}
      - DB_PASSWORD=${DB_PASSWORD:-zencial_secret}
      - DB_NAME=${DB_NAME:-zencial}
      - DB_SSL_MODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_ACCESS_SECRET=dev-secret-key-not-for-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-key-not-for-production
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-zencial-videos}
      - S3_REGION=us-east-1
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-zencial}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-zencial_secret}
      - POSTGRES_DB=${DB_NAME:-zencial}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zencial}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:
