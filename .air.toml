root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  entrypoint = "./tmp/main"
  cmd = "VERSION=\"${VERSION:-$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')-dev}\" && GIT_COMMIT=\"$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')\" && BUILD_TIME=\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" && go build -ldflags=\"-X 'github.com/zenfulcode/zencial/internal/infrastructure/buildinfo.Version=${VERSION}' -X 'github.com/zenfulcode/zencial/internal/infrastructure/buildinfo.Commit=${GIT_COMMIT}' -X 'github.com/zenfulcode/zencial/internal/infrastructure/buildinfo.BuildTime=${BUILD_TIME}'\" -o ./tmp/main ./cmd/api"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs", "deployments"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
