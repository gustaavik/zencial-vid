        minimum: 0
        type: number
    type: object
  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.UpdateProfileRequest:
    properties:
      avatar_url:
        example: https://example.com/avatar.jpg
        type: string
      country:
        example: US
        type: string
      date_of_birth:
        example: "1990-01-15"
        type: string
      display_name:
        example: Jane Doe
