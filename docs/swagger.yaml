      translations:
        items:
          $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.GenreTranslationResponse'
        type: array
      updated_at:
        example: "2025-01-01T00:00:00Z"
        type: string
    type: object
  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.GenreTranslationRequest:
    properties:
      description:
        example: Action-packed movies and series
        maxLength: 2000
        type: string
      language_code:
        example: en
        maxLength: 5
        minLength: 2
        type: string
      name:
        example: Action
        maxLength: 255
        minLength: 1
        type: string
    required:
    - language_code
    - name
    type: object
  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.GenreTranslationResponse:
    properties:
      description:
        example: Action-packed movies and series
        type: string
      language_code:
        example: en
        type: string
      name:
        example: Action
        type: string
    type: object
  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: securepassword123
        type: string
    required:
    - email
    - password
    type: object
  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.LogoutRequest:
    properties:
      refresh_token:
        example: abc123def456
