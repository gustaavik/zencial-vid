          $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.GenreTranslationRequest'
        minItems: 1
        type: array
    required:
    - translations
    type: object
  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.UpdatePlanRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      is_active:
        type: boolean
