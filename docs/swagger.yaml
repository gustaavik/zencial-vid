host: localhost:8080
info:
  contact:
    email: support@zencial.com
    name: Zencial API Support
  description: Video on Demand streaming platform API
  license:
    name: Proprietary
    url: http://zencial.com/license/
  termsOfService: http://zencial.com/terms/
  title: Zencial VOD API
  version: "1.0"
paths:
  /admin/analytics/summary:
    get:
      description: Returns aggregate viewing statistics over a reporting range for
        all videos on the platform (admin only).
      parameters:
      - default: 30d
        description: Reporting range
        enum:
        - 7d
        - 30d
        - 90d
        - all
        in: query
        name: range
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.PublisherSummaryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
