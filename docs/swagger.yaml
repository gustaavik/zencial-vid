  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      expires_at:
        example: "2025-01-01T00:15:00Z"
        type: string
      refresh_token:
        example: abc123def456
        type: string
    type: object
  github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.UpdateGenreRequest:
    properties:
      slug:
        example: action
        maxLength: 255
        minLength: 1
