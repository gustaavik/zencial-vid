host: localhost:8080
info:
  contact:
    email: support@zencial.com
    name: Zencial API Support
  description: Video on Demand streaming platform API
  license:
    name: Proprietary
    url: http://zencial.com/license/
  termsOfService: http://zencial.com/terms/
  title: Zencial VOD API
  version: "1.0"
paths:
  /admin/genres/bulk-create:
    post:
      consumes:
      - application/json
      description: Create multiple genres in a single request (admin only). Returns
        succeeded and failed entries.
      parameters:
      - description: Genres to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.BulkCreateGenreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.BulkCreateGenreResultResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk create genres
      tags:
      - genres
  /admin/genres/bulk-delete:
    post:
      consumes:
      - application/json
      description: Remove multiple genres in a single request (admin only). Returns
        succeeded and failed entries.
      parameters:
      - description: Genre IDs to delete
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.BulkGenreIDsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.BulkDeleteGenreResultResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk delete genres
      tags:
      - genres
  /admin/plans:
    get:
      description: Return a paginated list of all plans, including inactive ones (admin
        only)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Sort field (e.g. created_at,-level)
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.PlanResponse'
                  type: array
                meta:
                  $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Meta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all plans (admin)
      tags:
      - plans
  /admin/subscriptions:
    post:
      consumes:
      - application/json
      description: Create a new subscription for a user against a plan (admin only)
      parameters:
      - description: Subscription assignment
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.AssignSubscriptionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.SubscriptionResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Assign subscription
      tags:
      - subscriptions
  /admin/subscriptions/{id}:
    delete:
      description: Cancel an existing subscription by its ID (admin only)
      parameters:
      - description: Subscription ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel subscription
      tags:
      - subscriptions
  /admin/users:
    get:
      description: Return a paginated list of users (admin only)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Sort field (e.g. -created_at)
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.UserResponse'
                  type: array
                meta:
                  $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Meta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.ErrorResponse'
        "403":
