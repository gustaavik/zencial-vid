host: localhost:8080
info:
  contact:
    email: support@zencial.com
    name: Zencial API Support
  description: Video on Demand streaming platform API
  license:
    name: Proprietary
    url: http://zencial.com/license/
  termsOfService: http://zencial.com/terms/
  title: Zencial VOD API
  version: "1.0"
paths:
  /admin/audit-logs:
    get:
      description: Return a paginated list of admin audit log entries (admin only)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: 'Sort field (default: -occurred_at)'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_zenfulcode_zencial_internal_adapter_handler_v1_dto.AuditLogResponse'
                  type: array
                meta:
                  $ref: '#/definitions/github_com_zenfulcode_zencial_internal_pkg_httputil.Meta'
              type: object
        "400":
