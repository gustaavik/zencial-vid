version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - nolintlint
    - predeclared
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    nakedret:
      max-func-lines: 30
    misspell:
      locale: US
      ignore-rules:
        - cancelled
        - cancelling
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - unparam
      - path: cmd/
        linters:
          - unparam
